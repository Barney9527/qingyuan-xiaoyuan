backend:
  name: github
  repo: Barney9527/qingyuan-xiaoyuan
  branch: master

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "首页配置"
    label: "首页配置"
    folder: "content/home"
    create: true
    fields:
      - {label: "主标题", name: "heroTitle", widget: "string"}
      - {label: "副标题", name: "heroSubtitle", widget: "text"}
      - {label: "关于标题", name: "aboutTitle", widget: "string"}
      - {label: "关于内容", name: "aboutContent", widget: "text"}
      - {label: "服务标题", name: "servicesTitle", widget: "string"}

  - name: "服务项目"
    label: "服务项目"
    folder: "content/services"
    create: true
    fields:
      - {label: "服务名称", name: "title", widget: "string"}
      - {label: "服务描述", name: "description", widget: "text"}
      - {label: "图标", name: "icon", widget: "string"}
      - {label: "排序", name: "order", widget: "number"}

  - name: "联系方式"
    label: "联系方式"
    folder: "content/contact"
    create: true
    fields:
      - {label: "电话", name: "phone", widget: "string"}
      - {label: "地址", name: "address", widget: "string"}
      - {label: "邮箱", name: "email", widget: "string"}
